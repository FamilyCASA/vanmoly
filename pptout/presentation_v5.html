<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8">
<title>PPT Presentation</title><style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1920px;height:1080px;overflow:hidden;font-family:'Microsoft YaHei','PingFang SC',sans-serif}
.slide-deck{position:relative;width:1920px;height:1080px}
.slide{display:none;position:absolute;top:0;left:0;width:100%;height:100%;
  background-size:cover;background-position:center;background-repeat:no-repeat}
.slide.active{display:block}

/* Navigation */
.nc{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);
  display:flex;align-items:center;gap:20px;z-index:9999;
  background:rgba(0,0,0,.5);padding:10px 28px;border-radius:30px}
.nb{background:none;border:1px solid rgba(255,255,255,.6);color:#fff;
  font-size:22px;width:44px;height:44px;border-radius:50%;cursor:pointer;
  transition:.2s}
.nb:hover{background:rgba(255,255,255,.15)}
.sc2{color:#ccc;font-size:17px;min-width:60px;text-align:center}

.se-final{background:#7B2828 !important;display:flex;flex-direction:column;
  justify-content:center;align-items:center;gap:32px}
.db-oval-box{border:2px solid rgba(255,245,220,.45);border-radius:50px;
  padding:18px 56px;font-size:26px;color:rgba(255,245,220,.65);
  letter-spacing:6px;font-weight:700;text-align:center}
.closing-slogan{font-size:26px;color:rgba(255,248,230,.85);
  line-height:1.9;text-align:center;max-width:720px;padding:0 40px}
.closing-footer-text{font-size:14px;color:rgba(255,245,220,.35);
  letter-spacing:8px;text-transform:uppercase}
</style></head>

    </div>

<div class="nc">
    <button class="nb" onclick="prev()">&#8592;</button>
    <span class="sc2"><span id="cur">1</span> / <span id="tot">42</span></span>
    <button class="nb" onclick="next()">&#8594;</button>
</div>
<script>
let c=1,t=42;
document.getElementById('tot').textContent=t;
function show(n){if(n<1)n=1;if(n>t)n=t;c=n;
document.querySelectorAll('.slide').forEach((s,i)=>s.classList.toggle('active',i===n-1));
document.getElementById('cur').textContent=n;}
function next(){show(c+1)}
function prev(){show(c-1)}
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();next()}
if(e.key==='ArrowLeft'){e.preventDefault();prev()}});
document.addEventListener('click',e=>{if(!e.target.closest('.nc'))next()});
show(1);
</script></body></html>
