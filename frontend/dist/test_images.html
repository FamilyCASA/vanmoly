<!DOCTYPE html>
<html>
<head><title>Image Diagnosis</title></head>
<body>
<h2>Cover Image Diagnosis</h2>
<div id="results"></div>
<script>
const images = [
  '/uploads/cases/温馨_1.jpg',
  '/uploads/cases/沉稳_21.jpg',
  '/api/v3/upload/images/2026/04/20260430_062347_test_cover_dfb2a06a.jpg',
  '/placeholder-case.jpg'
];
const container = document.getElementById('results');
images.forEach(src => {
  const div = document.createElement('div');
  div.style.cssText = 'display:inline-block;margin:10px;text-align:center;';
  const img = document.createElement('img');
  img.src = src;
  img.style.cssText = 'width:200px;height:150px;object-fit:cover;border:1px solid #ccc;';
  img.onload = () => { div.innerHTML += '<br><span style="color:green">OK</span>'; };
  img.onerror = () => { div.innerHTML += '<br><span style="color:red">FAIL</span>'; };
  const label = document.createElement('div');
  label.textContent = src.substring(0, 40);
  label.style.cssText = 'font-size:11px;max-width:200px;overflow:hidden;';
  div.appendChild(label);
  div.appendChild(img);
  container.appendChild(div);
});
</script>
</body>
</html>
