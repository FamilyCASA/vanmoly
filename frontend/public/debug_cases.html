<!DOCTYPE html>
<html>
<head><title>Debug Cases</title></head>
<body>
<h2>CaseList Debug</h2>
<pre id="output">Loading...</pre>
<script type="module">
const out = document.getElementById('output');
function log(msg) { out.textContent += msg + '\n'; }

try {
  log('1. Testing /api/v3/public/cases/filters...');
  const fRes = await fetch('/api/v3/public/cases/filters');
  const fData = await fRes.json();
  log(`   Status: ${fRes.status}, Code: ${fData.code}`);
  log(`   Data keys: ${Object.keys(fData.data || {})}`);
  
  log('\n2. Testing /api/v3/public/cases...');
  const cRes = await fetch('/api/v3/public/cases?page=1&page_size=5');
  const cData = await cRes.json();
  log(`   Status: ${cRes.status}, Code: ${cData.code}`);
  
  // Simulate request.js interceptor
  const res = cData; // interceptor returns response.data
  log(`   res (interceptor output) keys: ${Object.keys(res)}`);
  log(`   res.data type: ${typeof res.data}`);
  log(`   res.data keys: ${Object.keys(res.data || {})}`);
  
  const items = res.data?.items || [];
  log(`   res.data?.items count: ${items.length}`);
  
  if (items.length > 0) {
    const first = items[0];
    log(`\n3. First item:`);
    log(`   id: ${first.id}`);
    log(`   title: ${first.title}`);
    log(`   atmosphere: ${first.atmosphere}`);
    log(`   cover_image: ${first.cover_image}`);
    log(`   status: ${first.status}`);
  }
  
  log('\n=== SUCCESS: API works correctly ===');
  log('If CaseList.vue shows empty, the issue is in Vue component logic.');
} catch(e) {
  log(`ERROR: ${e.message}\n${e.stack}`);
}
</script>
</body>
</html>
