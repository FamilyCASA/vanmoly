<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>物料配置表 - 独立组件</title>
<style>
/* ========== 基础样式 ========== */
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans SC',sans-serif;background:#f0f2f5;padding:20px}

/* 上传区域 */
.upload-zone{border:2px dashed #d9d9d9;border-radius:10px;padding:24px;text-align:center;cursor:pointer;transition:.2s;background:#fafafa;position:relative;overflow:hidden}
.upload-zone:hover{border-color:#722F37;background:#fff5f5}
.upload-zone.dragover{border-color:#722F37;background:#fff0f0}
.upload-zone .upload-icon{font-size:36px;color:#bbb;margin-bottom:8px}
.upload-zone .upload-hint{font-size:13px;color:#999}
.upload-zone input[type=file]{position:absolute;top:0;left:0;width:100%;height:100%;opacity:0;cursor:pointer}
.upload-preview{margin-top:12px;display:none}
.upload-preview.show{display:block}
.upload-preview img{max-width:100%;max-height:200px;border-radius:8px;border:1px solid #e8e8e8;object-fit:contain}
.upload-preview .preview-info{display:flex;justify-content:space-between;align-items:center;margin-top:6px;font-size:12px;color:#666}
.upload-preview .change-btn{color:#722F37;cursor:pointer;font-weight:500}
.upload-preview .change-btn:hover{text-decoration:underline}

/* 配置表容器 */
.config-table-wrapper{overflow-x:auto;overflow-y:auto;max-height:calc(100vh - 300px);margin-top:12px}

/* 配置表 */
.config-table{width:100%;font-size:12px;border-collapse:collapse;min-width:1100px}
.config-table thead{position:sticky;top:0;z-index:10;background:#fafafa}
.config-table th{padding:6px 4px;text-align:center;border:1px solid #e8e8e8;min-width:120px;background:#fafafa;font-weight:500;color:#666}
.config-table th.th-type1,.config-table th.th-type2{background:#f5f0eb}
.config-table td{padding:4px;border:1px solid #e8e8e8}

/* 配置表输入框 */
.cfg-input{width:100%;padding:4px;border:1px solid #e8e8e8;border-radius:3px;font-size:11px;box-sizing:border-box}
.cfg-input:focus{border-color:#722F37;outline:none;box-shadow:0 0 0 2px rgba(114,47,55,.1)}
.cfg-select{width:100%;padding:3px;border:1px solid #d4b896;border-radius:3px;font-size:11px;color:#722F37;background:#fff;box-sizing:border-box}
.cfg-select:disabled{background:#e8e8e8;color:#999;border-color:#e8e8e8}
.cfg-select:focus{border-color:#722F37;outline:none}

/* 物料搜索组合框 */
.cfg-material-combo{position:relative}
.cfg-material-filter{width:100%;padding:4px;border:1px solid #e8e8e8;border-radius:3px;font-size:11px;box-sizing:border-box;margin-bottom:2px}
.cfg-material-filter:disabled{background:#e8e8e8;color:#999;border-color:#e8e8e8}
.cfg-material-select{width:100%;padding:4px;border:1px solid #e8e8e8;border-radius:3px;font-size:11px;box-sizing:border-box}
.cfg-material-select:focus{border-color:#722F37;outline:none}

/* 计算列 */
.cfg-calc{text-align:center;font-size:11px;color:#722F37}
.cfg-amount{text-align:center;font-weight:600;color:#722F37;font-size:12px}

/* 按钮 */
.btn{padding:8px 16px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;transition:.2s}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-primary{background:#722F37;color:#fff}
.btn-primary:hover{background:#8B3A42}
.btn-outline{background:transparent;border:1px solid #d9d9d9;color:#666}
.btn-outline:hover{border-color:#722F37;color:#722F37}
.btn-danger{background:#ff4d4f;color:#fff}
.btn-danger:hover{background:#ff7875}

/* 操作按钮 */
.cfg-btn-clone{padding:2px 6px;border:1px solid #722F37;background:#fff;color:#722F37;border-radius:3px;cursor:pointer;font-size:11px;margin-right:2px}
.cfg-btn-clone:hover{background:#722F37;color:#fff}
.cfg-btn-delete{padding:2px 6px;border:1px solid #ff4d4f;background:#fff;color:#ff4d4f;border-radius:3px;cursor:pointer;font-size:11px}
.cfg-btn-delete:hover{background:#ff4d4f;color:#fff}

/* 物料浮层下拉 */
.material-dropdown{display:none;position:fixed;background:#fff;border:1px solid #ddd;border-radius:4px;max-height:240px;overflow-y:auto;z-index:9999;box-shadow:0 6px 20px rgba(0,0,0,.2);width:300px}
.mat-option{padding:7px 12px;cursor:pointer;font-size:12px;border-bottom:1px solid #f5f5f5}
.mat-option:hover{background:#f5f0eb;color:#722F37}

/* Toast */
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(80px);background:#333;color:#fff;padding:12px 24px;border-radius:8px;font-size:14px;z-index:2000;opacity:0;transition:.3s}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast.success{background:#52c41a}

/* Modal */
.modal-mask{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:1000;justify-content:center;align-items:center}
.modal-mask.show{display:flex}
.modal{background:#fff;border-radius:12px;width:90%;max-width:1400px;max-height:85vh;overflow-y:auto;box-shadow:0 8px 30px rgba(0,0,0,.2)}
.modal-head{padding:16px 20px;border-bottom:1px solid #f0f0f0;display:flex;justify-content:space-between;align-items:center}
.modal-head h3{font-size:16px}
.modal-close{width:32px;height:32px;border:none;background:#f5f5f5;border-radius:50%;cursor:pointer;font-size:18px;color:#999}
.modal-close:hover{background:#722F37;color:#fff}
.modal-body{padding:20px}
.modal-foot{padding:12px 20px;border-top:1px solid #f0f0f0;text-align:right;display:flex;gap:8px;justify-content:flex-end}

/* 表单 */
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;color:#666;margin-bottom:6px}
.form-input{width:100%;padding:8px 12px;border:1px solid #d9d9d9;border-radius:6px;font-size:14px;font-family:inherit;transition:.2s}
.form-input:focus{border-color:#722F37;outline:none;box-shadow:0 0 0 2px rgba(114,47,55,.1)}
.form-select{width:100%;padding:8px 12px;border:1px solid #d9d9d9;border-radius:6px;font-size:14px;font-family:inherit;transition:.2s;background:#fff}
.form-select:focus{border-color:#722F37;outline:none;box-shadow:0 0 0 2px rgba(114,47,55,.1)}

/* 标题 */
.page-title{font-size:18px;color:#333;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
</style>
</head>
<body>

<!-- 页面标题 -->
<div class="page-title">
    <h2>物料配置表</h2>
    <div style="display:flex;gap:10px">
        <button class="btn btn-outline" onclick="loadSampleData()">📥 加载示例数据</button>
        <button class="btn btn-primary" onclick="saveConfigData()">💾 保存配置</button>
    </div>
</div>

<!-- 空间管理弹窗触发按钮 -->
<button class="btn btn-primary" onclick="openSpaceFullModal()" style="margin-bottom:16px">+ 打开配置表弹窗</button>

<!-- 弹窗 -->
<div class="modal-mask" id="modal-generic">
    <div class="modal" id="modal-generic-box">
        <div class="modal-head">
            <h3 id="modal-generic-title">空间管理</h3>
            <button class="modal-close" onclick="closeModal('modal-generic')">&times;</button>
        </div>
        <div class="modal-body" id="modal-generic-body"></div>
        <div class="modal-foot">
            <button class="btn btn-outline" onclick="closeModal('modal-generic')">取消</button>
            <button class="btn btn-primary" onclick="saveSpaceFull()">保存</button>
        </div>
    </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- 物料浮层下拉 (全局单例) -->
<div class="material-dropdown" id="material-dropdown"></div>

<script>
// ========== 配置 ==========
const API = '';  // 后端 API 基础路径，空字符串表示相对路径
const BRAND_COLOR = '#722F37';  // 品牌色

// ========== 全局数据 ==========
let currentProjectId = null;
let currentSpaceId = null;
let window = {};  // 兼容原代码中的 window 全局变量
window.materialOptions = [];  // 物料库数据
window.currentCover = {};
window.templateTextElements = [];
window.templateImageElements = [];

// 物料浮层下拉相关
let _globalMaterialDD = null;
let _activeMaterialInput = null;

// ========== API 辅助函数 ==========
async function api(url, opts = {}) {
    const res = await fetch(API + url, {
        headers: {'Content-Type': 'application/json'},
        ...opts,
        body: opts.body ? JSON.stringify(opts.body) : undefined
    });
    return res.json();
}

function toast(msg, type='') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast ' + type + ' show';
    setTimeout(() => t.classList.remove('show'), 2500);
}

function esc(str) {
    if (!str) return '';
    return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
}

// ========== Modal 管理 ==========
function openModal(id, wide) {
    document.getElementById(id).classList.add('show');
    const box = document.getElementById(id + '-box');
    if (box) { 
        if (wide) box.classList.add('modal-wide'); 
        else box.classList.remove('modal-wide'); 
    }
}

function closeModal(id) { 
    document.getElementById(id).classList.remove('show'); 
}

// ========== 加载示例数据 ==========
async function loadSampleData() {
    try {
        // 尝试从后端加载物料库
        const {data: materials} = await api('/api/material_library');
        window.materialOptions = materials || [];
        toast('已加载 ' + materials.length + ' 条物料数据', 'success');
    } catch(e) {
        // 如果没有后端，使用模拟数据
        console.warn('无法从后端加载物料库，使用模拟数据');
        window.materialOptions = generateSampleMaterials();
        toast('已加载示例物料数据（' + window.materialOptions.length + ' 条）', 'success');
    }
    
    // 自动打开配置表
    setTimeout(() => openSpaceFullModal(), 500);
}

function generateSampleMaterials() {
    // 生成示例物料数据
    const types = ['板材', '五金', '玻璃', '石材', '布艺'];
    const stats = ['主材', '辅材', '饰面', '结构'];
    const materials = [];
    
    for (let i = 0; i < 50; i++) {
        const type1 = types[i % types.length];
        const type2 = stats[i % stats.length];
        materials.push({
            id: i + 1,
            name: type1 + '材料' + (i + 1),
            material_type: type1,
            statistic_type: type2,
            spec: (100 + i) + 'x' + (50 + i),
            unit: i % 3 === 0 ? '㎡' : (i % 3 === 1 ? '米' : '个'),
            retail_price: (100 + Math.random() * 900).toFixed(2),
            color: ['红', '白', '黑', '灰'][i % 4],
            brand: ['品牌A', '品牌B', '品牌C'][i % 3]
        });
    }
    
    return materials;
}

// ========== 打开空间管理弹窗 ==========
async function openSpaceFullModal(spaceId) {
    currentSpaceId = spaceId || 1;
    
    // 获取物料库（如果尚未加载）
    if (!window.materialOptions || window.materialOptions.length === 0) {
        try {
            const {data: materials} = await api('/api/material_library');
            window.materialOptions = materials || [];
        } catch(e) {
            window.materialOptions = generateSampleMaterials();
        }
    }
    
    const materials = window.materialOptions;
    
    // 构建弹窗内容
    document.getElementById('modal-generic-title').textContent = '空间管理：' + (spaceId ? '空间 ' + spaceId : '新空间');
    
    document.getElementById('modal-generic-body').innerHTML = `
        <div style="max-height:60vh;overflow-y:auto">
        <!-- 效果图上传区域 -->
        <div style="margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid #f0f0f0">
            <h4 style="font-size:15px;color:${BRAND_COLOR};margin-bottom:12px">效果图（可多选）</h4>
            <div class="upload-zone" id="upload-zone" style="padding:16px">
                <div class="upload-icon">📷</div>
                <div class="upload-hint">点击选择多张图片或拖拽到此处</div>
                <input type="file" accept="image/*" multiple onchange="handleMultiFileSelect(this)">
            </div>
            <div id="multi-preview-area" style="margin-top:12px;display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px"></div>
        </div>
        
        <!-- 产品说明（5维度） -->
        <div style="margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid #f0f0f0">
            <h4 style="font-size:15px;color:${BRAND_COLOR};margin-bottom:12px">产品说明（5维度）</h4>
            ${[1,2,3,4,5].map(i => `
                <div style="margin-bottom:10px">
                    <div style="display:flex;gap:8px;align-items:center;margin-bottom:4px">
                        <input type="text" id="pd_dim${i}_title" value="${['外观比例','体块结构','材质搭配','功能落地','定制工艺'][i-1]}" style="flex:1;padding:6px 10px;border:1px solid #e8e8e8;border-radius:4px;font-size:13px">
                    </div>
                    <textarea id="pd_dim${i}_content" rows="2" style="width:100%;padding:6px 10px;border:1px solid #e8e8e8;border-radius:4px;font-size:13px;resize:vertical" placeholder="${['柜体外观比例设计说明','体块结构设计说明','材质搭配逻辑说明','功能落地说明','定制工艺说明'][i-1]}"></textarea>
                </div>
            `).join('')}
        </div>
        
        <!-- 配置表 -->
        <div style="margin-bottom:10px">
            <h4 style="font-size:15px;color:${BRAND_COLOR};margin-bottom:12px">配置表（报价表）</h4>
            <div class="config-table-wrapper" id="config-table-wrapper">
            <table class="config-table" id="config-table">
                <thead>
                    <tr>
                        <th style="min-width:120px">名称</th>
                        <th class="th-type1" style="min-width:100px">类别属性</th>
                        <th class="th-type2" style="min-width:100px">统计属性</th>
                        <th style="min-width:140px">物料</th>
                        <th style="min-width:80px">规格</th>
                        <th style="min-width:60px">宽mm</th>
                        <th style="min-width:60px">深mm</th>
                        <th style="min-width:60px">高mm</th>
                        <th style="min-width:60px">计量</th>
                        <th style="min-width:50px">数量</th>
                        <th style="min-width:60px">单价</th>
                        <th style="min-width:70px">金额</th>
                        <th style="min-width:70px">操作</th>
                    </tr>
                </thead>
                <tbody id="config-tbody">
                    <!-- 配置行将通过 JS 动态添加 -->
                </tbody>
            </table>
            </div>
            <button onclick="addConfigRow()" style="display:inline-block;margin-top:12px;padding:6px 16px;border:1px solid ${BRAND_COLOR};background:#fff;color:${BRAND_COLOR};border-radius:4px;cursor:pointer;font-size:12px;box-sizing:border-box">+ 添加配置行</button>
        </div>
        </div>
    `;
    
    // 设置拖拽上传
    setupMultiDragDrop('upload-zone');
    
    // 填充级联筛选选项
    setTimeout(() => { 
        populateCascadeOptions(); 
        // 如果有示例数据，初始化一行
        if (document.querySelectorAll('#config-tbody tr').length === 0) {
            addConfigRow();
        }
    }, 100);
    
    openModal('modal-generic', true);
}

// ========== 效果图上传相关 ==========

/** 处理多文件选择 */
function handleMultiFileSelect(input) {
    const files = Array.from(input.files);
    if (!files.length) return;
    
    files.forEach(file => {
        if (!file.type.startsWith('image/')) return;
        if (file.size > 10 * 1024 * 1024) return;
        
        const reader = new FileReader();
        reader.onload = (e) => {
            const area = document.getElementById('multi-preview-area');
            const div = document.createElement('div');
            div.className = 'preview-item';
            div.dataset.path = '';
            div.dataset.file = 'pending';
            div.innerHTML = `
                <img src="${e.target.result}" style="width:100%;height:80px;object-fit:cover;border-radius:6px;border:1px solid #e8e8e8">
                <button onclick="this.parentElement.remove()" style="position:absolute;top:2px;right:2px;width:20px;height:20px;border-radius:50%;border:none;background:rgba(0,0,0,.6);color:#fff;cursor:pointer;font-size:12px">&times;</button>
                <input type="text" placeholder="说明（可选）" style="width:100%;margin-top:4px;font-size:10px;padding:3px 6px;border:1px solid #e8e8e8;border-radius:4px" onchange="this.parentElement.dataset.copy=this.value">
            `;
            div.style.position = 'relative';
            area.appendChild(div);
        };
        reader.readAsDataURL(file);
    });
}

/** 设置拖拽上传 */
function setupMultiDragDrop(zoneId) {
    const zone = document.getElementById(zoneId);
    if (!zone) return;
    
    ['dragenter', 'dragover'].forEach(evt => zone.addEventListener(evt, (e) => { 
        e.preventDefault(); 
        e.stopPropagation(); 
        zone.classList.add('dragover'); 
    }));
    
    ['dragleave', 'drop'].forEach(evt => zone.addEventListener(evt, (e) => { 
        e.preventDefault(); 
        e.stopPropagation(); 
        zone.classList.remove('dragover'); 
    }));
    
    zone.addEventListener('drop', (e) => {
        const files = e.dataTransfer.files;
        if (!files.length) return;
        const input = zone.querySelector('input[type=file]');
        if (input) {
            const dt = new DataTransfer();
            Array.from(files).forEach(f => dt.items.add(f));
            input.files = dt.files;
            handleMultiFileSelect(input);
        }
    });
}

// ========== 配置表核心功能 ==========

/** 添加配置行 */
function addConfigRow(data) {
    const tbody = document.getElementById('config-tbody');
    if (!tbody) {
        console.error('addConfigRow: config-tbody not found');
        return;
    }
    
    const materials = window.materialOptions || [];
    const d = data || {};
    const tr = document.createElement('tr');
    tr.innerHTML = `
        <td style="padding:4px"><input type="text" value="${esc(d.name||'')}" placeholder="自定义名称" class="cfg-input cfg-name"></td>
        <td style="padding:4px;text-align:center">
            <select class="cfg-select cfg-type1" onchange="onRowType1Change(this)">
                <option value="">选择</option>
            </select>
        </td>
        <td style="padding:4px;text-align:center">
            <select class="cfg-select cfg-type2" disabled onchange="onRowType2Change(this)">
                <option value="">选择</option>
            </select>
        </td>
        <td style="padding:4px;position:relative">
            <div class="cfg-material-combo">
                <input type="text" class="cfg-material-filter cfg-input" placeholder="输入关键字筛选..." oninput="filterMaterialSelect(this)">
                <select class="cfg-material-select" onchange="onMaterialSelect(this)">
                    <option value="">-- 选择物料 --</option>
                </select>
            </div>
            <input type="hidden" class="cfg-material-id" value="${d.material_id||''}">
        </td>
        <td style="padding:4px"><input type="text" value="${esc(d.spec||'')}" class="cfg-input cfg-spec" readonly></td>
        <td style="padding:4px"><input type="number" value="${d.width||''}" class="cfg-input cfg-width" oninput="recalcRow(this)"></td>
        <td style="padding:4px"><input type="number" value="${d.depth||''}" class="cfg-input cfg-depth" oninput="recalcRow(this)"></td>
        <td style="padding:4px"><input type="number" value="${d.height||''}" class="cfg-input cfg-height" oninput="recalcRow(this)"></td>
        <td style="padding:4px;text-align:center;font-size:11px;color:${BRAND_COLOR}" class="cfg-calc">-</td>
        <td style="padding:4px"><input type="number" value="${d.quantity||1}" class="cfg-input cfg-qty" oninput="recalcRow(this)"></td>
        <td style="padding:4px"><input type="number" value="${d.price||d.unit_price||''}" step="0.01" class="cfg-input cfg-price" oninput="recalcRow(this)"></td>
        <td style="padding:4px;text-align:center;font-weight:600;color:${BRAND_COLOR};font-size:12px" class="cfg-amount">0.00</td>
        <td style="padding:4px;text-align:center">
            <button onclick="cloneConfigRow(this)" class="cfg-btn-clone" title="克隆">📋</button>
            <button onclick="this.closest('tr').remove()" class="cfg-btn-delete" title="删除">🗑</button>
        </td>
    `;
    tbody.appendChild(tr);
}

/** 克隆配置行 */
function cloneConfigRow(btn) {
    const tr = btn.closest('tr');
    const data = {
        name: tr.querySelector('.cfg-name')?.value || '',
        material_id: tr.querySelector('.cfg-material-id')?.value || '',
        spec: tr.querySelector('.cfg-spec')?.value || '',
        width: tr.querySelector('.cfg-width')?.value || '',
        depth: tr.querySelector('.cfg-depth')?.value || '',
        height: tr.querySelector('.cfg-height')?.value || '',
        quantity: tr.querySelector('.cfg-qty')?.value || 1,
        price: tr.querySelector('.cfg-price')?.value || ''
    };
    addConfigRow(data);
    
    // 复制 unit 并重新计算
    const newTr = document.querySelector('#config-tbody tr:last-child');
    if (newTr) {
        newTr.dataset.unit = tr.dataset.unit || '';
        recalcRow(newTr.querySelector('.cfg-name'));
    }
}

// ========== 级联筛选逻辑 ==========

/** 填充级联筛选选项 */
function populateCascadeOptions() {
    const materials = window.materialOptions || [];
    if (materials.length === 0) {
        console.warn('populateCascadeOptions: window.materialOptions is empty, skipping');
        return;
    }
    
    // 收集所有类别属性和统计属性
    const type1Set = new Set();
    const type2Set = new Set();
    for (let i = 0; i < materials.length; i++) {
        if (materials[i].material_type) type1Set.add(materials[i].material_type);
        if (materials[i].statistic_type) type2Set.add(materials[i].statistic_type);
    }
    const type1Values = Array.from(type1Set).sort();
    const type2Values = Array.from(type2Set).sort();
    
    // 构建 option HTML
    let type1Options = '<option value="">--</option>';
    let type2Options = '<option value="">--</option>';
    for (let i = 0; i < type1Values.length; i++) {
        const v = type1Values[i].replace(/"/g, '&quot;');
        type1Options += '<option value="' + v + '">' + v + '</option>';
    }
    for (let i = 0; i < type2Values.length; i++) {
        const v = type2Values[i].replace(/"/g, '&quot;');
        type2Options += '<option value="' + v + '">' + v + '</option>';
    }
    
    // 填充所有配置行的级联下拉框
    const selects1 = document.querySelectorAll('.cfg-type1');
    const selects2 = document.querySelectorAll('.cfg-type2');
    for (let i = 0; i < selects1.length; i++) selects1[i].innerHTML = type1Options;
    for (let i = 0; i < selects2.length; i++) selects2[i].innerHTML = type2Options;
    
    // 使用 MutationObserver 监听动态添加的行
    if (window._cascadeObserver) window._cascadeObserver.disconnect();
    const modalBody = document.getElementById('modal-generic-body') || document.body;
    window._cascadeObserver = new MutationObserver(function(mutations) {
        mutations.forEach(function(mutation) {
            const nodes = mutation.addedNodes;
            for (let i = 0; i < nodes.length; i++) {
                const node = nodes[i];
                if (node.nodeType !== 1) continue;
                const allSelects = node.querySelectorAll ? node.querySelectorAll('.cfg-type1,.cfg-type2') : [];
                for (let j = 0; j < allSelects.length; j++) {
                    const sel = allSelects[j];
                    if (sel.tagName === 'SELECT') {
                        if (sel.classList.contains('cfg-type1')) sel.innerHTML = type1Options;
                        else if (sel.classList.contains('cfg-type2')) sel.innerHTML = type2Options;
                    }
                }
            }
        });
    });
    window._cascadeObserver.observe(modalBody, { childList: true, subtree: true });
    
    console.log('populateCascadeOptions: types=' + type1Values.length + ', materials=' + materials.length);
}

/** 类别属性变更 */
function onRowType1Change(sel) {
    console.log("onRowType1Change fired, value=" + sel.value);
    const tr = sel.closest('tr');
    if (!tr) return;
    
    const type2 = tr.querySelector('.cfg-type2');
    const matFilter = tr.querySelector('.cfg-material-filter');
    const matSel = tr.querySelector('.cfg-material-select');
    const materials = window.materialOptions || [];
    const type1Val = sel.value;
    
    if (type1Val) {
        // 解锁统计属性
        if (type2) {
            type2.disabled = false;
            type2.style.background = '#fff';
            type2.style.color = BRAND_COLOR;
            const filteredType2 = [...new Set(materials.filter(m => m.material_type === type1Val).map(m => m.statistic_type).filter(Boolean))];
            type2.innerHTML = '<option value="">选择</option>' + filteredType2.map(v => `<option value="${esc(v)}">${esc(v)}</option>`).join('');
        }
        
        // 解锁物料搜索
        if (matFilter) {
            matFilter.disabled = false;
            matFilter.placeholder = '输入关键字筛选物料...';
            matFilter.style.background = '#fff';
            matFilter.style.color = '#333';
        }
        
        // 重建物料下拉选项
        rebuildMaterialSelect(tr, type1Val, '');
    } else {
        // 锁定统计属性
        if (type2) {
            type2.disabled = true;
            type2.style.background = '#e8e8e8';
            type2.style.color = '#999';
            type2.value = '';
            type2.innerHTML = '<option value="">选择</option>';
        }
        
        // 锁定物料搜索
        if (matFilter) {
            matFilter.disabled = true;
            matFilter.value = '';
            matFilter.placeholder = '请先选择类别';
            matFilter.style.background = '#e8e8e8';
            matFilter.style.color = '#999';
        }
        if (matSel) {
            matSel.innerHTML = '<option value="">-- 选择物料 --</option>';
        }
        
        // 清空隐藏的物料 ID
        const matId = tr.querySelector('.cfg-material-id');
        if (matId) matId.value = '';
        const specInput = tr.querySelector('.cfg-spec');
        if (specInput) specInput.value = '';
        const priceInput = tr.querySelector('.cfg-price');
        if (priceInput) priceInput.value = '';
    }
    
    // 触发统计属性变更
    if (type2) onRowType2Change(type2);
}

/** 统计属性变更 */
function onRowType2Change(sel) {
    const tr = sel.closest('tr');
    if (!tr) return;
    
    const type1 = tr.querySelector('.cfg-type1');
    const type1Val = type1 ? type1.value : '';
    const type2Val = sel.value;
    
    // 重建物料下拉选项
    if (type1Val) {
        rebuildMaterialSelect(tr, type1Val, type2Val);
    }
    
    // 检查当前选中的物料是否仍然匹配新的筛选条件
    const matId = tr.querySelector('.cfg-material-id');
    if (matId && matId.value) {
        const materials = window.materialOptions || [];
        const curMat = materials.find(m => m.id == matId.value);
        if (curMat && type1Val && curMat.material_type !== type1Val) {
            // 不匹配，清空
            matId.value = '';
            const specInput = tr.querySelector('.cfg-spec');
            if (specInput) specInput.value = '';
        }
        if (curMat && type2Val && curMat.statistic_type !== type2Val) {
            // 不匹配，清空
            matId.value = '';
            const specInput = tr.querySelector('.cfg-spec');
            if (specInput) specInput.value = '';
        }
    }
}

/** 重建物料下拉选项 */
function rebuildMaterialSelect(tr, type1Val, type2Val) {
    const matSel = tr.querySelector('.cfg-material-select');
    if (!matSel) { 
        console.warn('rebuildMaterialSelect: no matSel found in row'); 
        return; 
    }
    
    const materials = window.materialOptions || [];
    console.log('rebuildMaterialSelect: type1=' + type1Val + ' type2=' + type2Val + ' totalMats=' + materials.length);
    
    // 筛选物料
    let filtered = materials.filter(m => m.material_type === type1Val);
    if (type2Val) filtered = filtered.filter(m => m.statistic_type === type2Val);
    
    // 保留当前选中的值
    const selectedId = tr.querySelector('.cfg-material-id')?.value || '';
    
    // 重建选项
    let html = '<option value="">-- 选择物料 --</option>';
    for (let i = 0; i < filtered.length; i++) {
        const m = filtered[i];
        const sel = (m.id && String(m.id) === selectedId) ? ' selected' : '';
        html += `<option value="${m.id||''}"${sel} data-spec="${esc(m.spec||'')}" data-unit="${esc(m.unit||'')}" data-price="${m.retail_price||''}">${esc(m.name)}${m.spec ? ' ' + esc(m.spec) : ''}</option>`;
    }
    matSel.innerHTML = html;
    matSel._allOptions = null;  // 清除缓存
}

/** 物料下拉关键字筛选 */
function filterMaterialSelect(input) {
    const combo = input.closest('.cfg-material-combo');
    if (!combo) return;
    
    const sel = combo.querySelector('.cfg-material-select');
    if (!sel) return;
    
    const q = (input.value || '').trim().toLowerCase();
    
    // 首次调用时缓存所有选项
    if (!sel._allOptions) {
        sel._allOptions = [];
        const opts = sel.options;
        for (let i = 0; i < opts.length; i++) {
            sel._allOptions.push({ 
                value: opts[i].value, 
                text: opts[i].textContent, 
                dataset: { spec: opts[i].dataset.spec || '', unit: opts[i].dataset.unit || '', price: opts[i].dataset.price || '' },
                selected: opts[i].selected 
            });
        }
    }
    
    // 根据关键字重建选项
    const currentVal = sel.value;
    let html = '';
    for (let i = 0; i < sel._allOptions.length; i++) {
        const o = sel._allOptions[i];
        if (q && o.text.toLowerCase().indexOf(q) < 0) continue;
        const selAttr = (o.value === currentVal) ? ' selected' : '';
        html += '<option value="' + (o.value||'') + '" data-spec="' + (o.dataset.spec||'') + '" data-unit="' + (o.dataset.unit||'') + '" data-price="' + (o.dataset.price||'') + '"' + selAttr + '>' + o.text + '</option>';
    }
    sel.innerHTML = html;
}

/** 物料下拉选择回调 */
function onMaterialSelect(sel) {
    const opt = sel.options[sel.selectedIndex];
    if (!opt || !opt.value) return;
    
    const tr = sel.closest('tr');
    if (!tr) return;
    
    // 从 dataset 获取物料信息回填
    const spec = opt.dataset.spec || '';
    const unit = opt.dataset.unit || '';
    const price = opt.dataset.price || '';
    
    // 回填规格
    const specInput = tr.querySelector('.cfg-spec');
    if (specInput) specInput.value = spec;
    
    // 回填单价
    const priceInput = tr.querySelector('.cfg-price');
    if (priceInput && price) priceInput.value = price;
    
    // 更新隐藏的物料 ID
    const matId = tr.querySelector('.cfg-material-id');
    if (matId) matId.value = opt.value;
    
    // 更新计量单位（用于计算）
    tr.dataset.unit = unit || '';
    
    // 触发金额计算
    recalcRow(tr);
}

// ========== 计算逻辑 ==========

/** 重新计算行金额 */
function recalcRow(el) {
    const tr = el.closest ? el.closest('tr') : null;
    if (!tr) return;
    
    const w = parseFloat(tr.querySelector('.cfg-width')?.value) || 0;
    const d = parseFloat(tr.querySelector('.cfg-depth')?.value) || 0;
    const h = parseFloat(tr.querySelector('.cfg-height')?.value) || 0;
    const qty = parseFloat(tr.querySelector('.cfg-qty')?.value) || 0;
    const price = parseFloat(tr.querySelector('.cfg-price')?.value) || 0;
    const unit = (tr.dataset.unit || '').toLowerCase();
    
    let calcVal = null;
    
    // 根据计量单位计算
    if (unit === 'm' || unit === '米' || unit === '延米') {
        // 长度：取 w,d,h 最大值（单位：米）
        if (w > 0 || d > 0 || h > 0) calcVal = Math.max(w, d, h) / 1000;
    } else if (unit === '㎡' || unit === '平方米' || unit === 'm²' || unit === 'm2') {
        // 面积：取两两乘积最大值（单位：平方米）
        const areas = [w*h, w*d, h*d].filter(a => a > 0);
        calcVal = areas.length > 0 ? Math.max(...areas) / 1000000 : null;
    } else if (unit === 'm³' || unit === '立方米' || unit === 'm3') {
        // 体积：w*d*h（单位：立方米）
        if (w > 0 && d > 0 && h > 0) calcVal = (w * d * h) / 1000000000;
    } else {
        // 默认：按数量
        calcVal = 1;
    }
    
    const calcEl = tr.querySelector('.cfg-calc');
    const amountEl = tr.querySelector('.cfg-amount');
    
    if (calcEl) calcEl.textContent = calcVal !== null ? calcVal.toFixed(3) : '-';
    
    const amount = calcVal !== null ? calcVal * qty * price : 0;
    if (amountEl) amountEl.textContent = amount.toFixed(2);
}

// ========== 初始化已有行的级联 ==========

function initExistingRowTypes() {
    const materials = window.materialOptions || [];
    document.querySelectorAll('#config-tbody tr').forEach(tr => {
        const matId = tr.querySelector('.cfg-material-id');
        const type1Sel = tr.querySelector('.cfg-type1');
        const type2Sel = tr.querySelector('.cfg-type2');
        const matFilter = tr.querySelector('.cfg-material-filter');
        
        if (!matId || !type1Sel || !type2Sel) return;
        
        const mid = matId.value;
        if (mid) {
            const mat = materials.find(m => m.id == mid);
            if (mat) {
                type1Sel.value = mat.material_type || '';
                onRowType1Change(type1Sel);
                if (mat.statistic_type) type2Sel.value = mat.statistic_type;
                // 重建物料下拉
                rebuildMaterialSelect(tr, mat.material_type || '', mat.statistic_type || '');
                // 解锁物料搜索
                if (matFilter) {
                    matFilter.disabled = false;
                    matFilter.placeholder = '输入关键字筛选物料...';
                    matFilter.style.background = '#fff';
                    matFilter.style.color = '#333';
                }
            }
        }
    });
}

// ========== 保存配置 ==========

async function saveSpaceFull() {
    toast('正在保存...');
    
    // 1. 收集效果图数据
    const renderings = [];
    const previewItems = document.querySelectorAll('#multi-preview-area .preview-item');
    
    previewItems.forEach(item => {
        const img = item.querySelector('img');
        if (img && img.src) {
            renderings.push({
                image_path: img.src,
                copy_text: item.dataset.copy || ''
            });
        }
    });
    
    // 2. 收集产品说明数据（5维度）
    const productDescription = {};
    for (let i = 1; i <= 5; i++) {
        const titleEl = document.getElementById('pd_dim' + i + '_title');
        const contentEl = document.getElementById('pd_dim' + i + '_content');
        if (titleEl && contentEl) {
            productDescription['dimension_' + i + '_title'] = titleEl.value;
            productDescription['dimension_' + i + '_content'] = contentEl.value;
        }
    }
    
    // 3. 收集配置表数据
    const configs = [];
    const configRows = document.querySelectorAll('#config-tbody tr');
    configRows.forEach(row => {
        const name = row.querySelector('.cfg-name')?.value || '';
        const materialId = row.querySelector('.cfg-material-id')?.value || null;
        const spec = row.querySelector('.cfg-spec')?.value || '';
        const width = parseFloat(row.querySelector('.cfg-width')?.value) || null;
        const depth = parseFloat(row.querySelector('.cfg-depth')?.value) || null;
        const height = parseFloat(row.querySelector('.cfg-height')?.value) || null;
        const quantity = parseFloat(row.querySelector('.cfg-qty')?.value) || 1;
        const price = parseFloat(row.querySelector('.cfg-price')?.value) || null;
        const amount = parseFloat(row.querySelector('.cfg-amount')?.textContent) || 0;
        
        configs.push({
            name: name,
            material_id: materialId,
            spec: spec,
            width: width,
            depth: depth,
            height: height,
            quantity: quantity,
            price: price,
            amount: amount,
            unit: row.dataset.unit || ''
        });
    });
    
    // 4. 构造保存数据
    const saveData = {
        space_id: currentSpaceId,
        renderings: renderings,
        product_description: productDescription,
        configs: configs
    };
    
    console.log('saveSpaceFull: saveData=', saveData);
    
    // 5. 发送到后端（如果有）
    try {
        if (currentSpaceId) {
            await api('/api/spaces/' + currentSpaceId + '/full', {method: 'PUT', body: saveData});
            toast('保存成功', 'success');
        } else {
            // 没有后端，保存到 localStorage
            localStorage.setItem('material_config_data', JSON.stringify(saveData));
            toast('已保存到本地存储', 'success');
        }
    } catch(e) {
        // 保存到 localStorage 作为备份
        localStorage.setItem('material_config_data', JSON.stringify(saveData));
        toast('后端保存失败，已保存到本地', 'success');
        console.error('saveSpaceFull error:', e);
    }
    
    closeModal('modal-generic');
}

/** 保存配置数据到后端或 localStorage */
async function saveConfigData() {
    await saveSpaceFull();
}
